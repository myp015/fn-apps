<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZeroTier 组网</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">FN Apps</p>
        <h1>ZeroTier 组网控制台</h1>
        <p class="subtitle">查看节点身份和服务状态，并直接加入或退出 ZeroTier 网络。</p>
      </div>
      <div class="hero-actions">
        <button id="refreshBtn" class="btn btn-primary" type="button">刷新状态</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel status-panel">
        <div class="panel-head">
          <h2>服务状态</h2>
          <div id="serviceBadge" class="badge badge-muted">读取中</div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Node ID</span>
            <strong id="nodeId">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">版本</span>
            <strong id="version">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">系统服务</span>
            <strong id="serviceEnabled">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">在线状态</span>
            <strong id="onlineState">-</strong>
          </div>
        </div>
        <div class="meta-list">
          <div><span>端口</span><strong id="servicePort">-</strong></div>
          <div><span>地址</span><strong id="assignedAddresses">-</strong></div>
        </div>
      </section>

      <section class="panel join-panel">
        <div class="panel-head">
          <h2>加入网络</h2>
        </div>
        <form id="joinForm" class="join-form">
          <label for="networkId">Network ID</label>
          <input id="networkId" name="networkId" type="text" maxlength="16" placeholder="例如：8056c2e21c000001"
            autocomplete="off">
          <button class="btn btn-primary" type="submit">加入</button>
        </form>
        <p class="hint">请输入 16 位十六进制网络 ID。你也可以先打开 <a class="hint-link" href="https://my.zerotier.com/" target="_blank"
            rel="noreferrer">https://my.zerotier.com/</a> 管理网络，加入后网络会出现在下方列表。</p>
      </section>

      <section class="panel networks-panel">
        <div class="panel-head">
          <h2>已加入网络</h2>
          <span id="networkCount" class="panel-meta">0 个网络</span>
        </div>
        <div id="networksEmpty" class="empty-state">当前还没有加入任何网络。</div>
        <div id="networkList" class="network-list"></div>
      </section>

      <section class="panel peers-panel">
        <div class="panel-head">
          <h2>Peer 概览</h2>
          <span id="peerSummary" class="panel-meta">-</span>
        </div>
        <div id="peerList" class="peer-list">
          <div class="empty-state">等待加载 Peer 信息。</div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
